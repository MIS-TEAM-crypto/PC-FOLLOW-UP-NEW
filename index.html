<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PC Follow-Up Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0f172a;
  }
  .frame-wrap {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #0f172a;
    color: #64748b;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 14px;
    z-index: 1;
    transition: opacity 0.3s ease;
  }
  .loader.hide {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid #334155;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="frame-wrap">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Loading PC Follow-Up Dashboard…</div>
  </div>
  <iframe
    id="dashboardFrame"
    src="https://script.google.com/macros/s/AKfycbwGvAdydJksgsUwVC4KQj2Sxjk4OSmu65pux_l1MBDXY-82SU97tJbpI8qQMqrPB5-C/exec"
    title="PC Follow-Up Dashboard"
    allow="clipboard-write"
    onload="document.getElementById('loader').classList.add('hide')">
  </iframe>
</div>

</body>
</html>
